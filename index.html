<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Critterwave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="crt-overlay" aria-hidden="true"></div>

    <div class="confirm-overlay hidden" id="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="confirm-panel" id="confirm-panel">
        <h2 class="confirm-title" id="confirm-title"></h2>
        <p class="confirm-message" id="confirm-message"></p>
        <div class="confirm-actions">
          <button type="button" class="cmd cmd-confirm-cancel" id="confirm-cancel">Cancel</button>
          <button type="button" class="cmd cmd-confirm-ok" id="confirm-ok">Yes</button>
        </div>
      </div>
    </div>

    <div class="character-setup hidden" id="character-setup">
      <div class="setup-panel">
        <div class="setup-fields">
          <h2 class="setup-title">What critter are you?</h2>
          <div class="setup-name-field">
            <label class="setup-name-label" for="hero-name-input">Your name</label>
            <input
              type="text"
              id="hero-name-input"
              class="setup-name-input"
              maxlength="16"
              autocomplete="nickname"
              spellcheck="false"
              placeholder="Up to 16 characters"
            required
            />
          </div>
          <div class="emoji-picker" id="hero-picker" role="listbox" aria-label="What critter are you?"></div>
        </div>
        <button type="button" class="cmd cmd-start" id="setup-start-btn" disabled>Fight!</button>
      </div>
    </div>

    <div class="game-shell">
      <header class="title-bar">
        <h1 class="title">Critterwave</h1>
      </header>

      <div class="playfield">
        <div class="hud">
          <div class="hud-block hud-wave">
            <span class="hud-label">Wave</span>
            <span class="hud-value" id="wave-banner">1</span>
          </div>
          <div class="hud-block hud-turn">
            <span class="hud-label">Turn</span>
            <span class="hud-value" id="turn-label">1</span>
          </div>
          <div class="hud-block hud-records">
            <span class="hud-label">Best</span>
            <span class="hud-value" id="stat-best-wave">0</span>
          </div>
        </div>

        <main class="arena" id="arena">
        <div class="battle-stage" id="battle-stage">
          <div class="stage-floor"></div>
          <div class="stage-vignette"></div>

          <section class="combatant hero-side" id="player-panel" aria-label="Player">
            <div class="status-panel hero-status">
              <div class="name-plate hero-plate">
                <span class="name" id="hero-name">HERO</span>
              </div>
              <span class="buff-badge hero-buff hidden" id="player-buff" aria-label="Active buff"></span>
              <div class="hp-wrap hero-hp-wrap">
                <div class="hp-row">
                  <span class="hp-tag hp-tag-hero">HP</span>
                  <div
                    class="hp-bar"
                    role="progressbar"
                    aria-label="Hero health"
                    aria-valuemin="0"
                    aria-valuemax="20"
                    aria-valuenow="20"
                  >
                    <div class="hp-fill player-hp" id="player-hp-fill"></div>
                  </div>
                  <span class="hp-numbers" id="player-hp-text">20/20</span>
                  <span class="stat-mini">ATK <span id="player-attack">5</span></span>
                </div>
              </div>
            </div>
            <div class="sprite-wrap">
              <div class="emoji-stack">
                <span class="hit-mark hit-mark-hero" aria-hidden="true">💢</span>
                <span class="emoji-sprite hero-emoji" id="hero-emoji" role="img" aria-label="Hero">🦊</span>
              </div>
            </div>
          </section>

          <div class="vs-badge" aria-hidden="true">VS</div>

          <section class="combatant enemy-side" id="foe-panel" aria-label="Foe">
            <div class="status-panel enemy-status">
              <div class="name-plate enemy-plate">
                <span class="name" id="foe-name">FOE</span>
              </div>
              <span class="buff-badge enemy-buff hidden" id="foe-buff" aria-label="Foe hype"></span>
              <div class="hp-wrap enemy-hp-wrap">
                <div class="hp-row">
                  <span class="hp-tag hp-tag-enemy">HP</span>
                  <div
                    class="hp-bar"
                    role="progressbar"
                    aria-label="Foe health"
                    aria-valuemin="0"
                    aria-valuemax="12"
                    aria-valuenow="12"
                  >
                    <div class="hp-fill foe-hp" id="foe-hp-fill"></div>
                  </div>
                  <span class="hp-numbers" id="foe-hp-text">12/12</span>
                  <span class="stat-mini">ATK <span id="foe-attack">3</span></span>
                </div>
              </div>
            </div>
            <div class="sprite-wrap foe-sprite-wrap">
              <div class="emoji-stack">
                <span class="hit-mark hit-mark-foe" aria-hidden="true">💢</span>
                <span class="emoji-sprite foe-emoji" id="foe-emoji" role="img" aria-label="Foe">👺</span>
              </div>
            </div>
          </section>

          <div class="damage-layer" id="damage-layer" aria-hidden="true"></div>
        </div>

        <div class="action-panel">
          <div class="dialog-box">
            <p class="battle-text" id="battle-text" role="status" aria-live="polite">
              What will you do?
            </p>
          </div>

          <nav class="command-menu" id="actions" aria-label="Combat actions">
            <button type="button" data-action="attack" class="cmd cmd-attack">Attack</button>
            <button type="button" data-action="heal" class="cmd cmd-heal">Heal</button>
            <button type="button" data-action="dance" class="cmd cmd-dance">Dance</button>
            <button type="button" data-action="run" class="cmd cmd-run">Run</button>
          </nav>
        </div>

        <div class="game-over hidden" id="game-over">
          <div class="game-over-panel">
            <p class="game-over-tag" id="game-over-tag">GAME OVER</p>
            <p id="game-over-summary"></p>
            <button type="button" class="cmd cmd-restart" id="restart-btn">
              <span class="cmd-icon">↻</span>
              <span class="cmd-label">Try again?</span>
            </button>
          </div>
        </div>
        </main>
      </div>

      <footer class="records-bar" aria-label="Lifetime stats and game options">
        <span class="records-stat">
          <span>Runs</span>
          <strong id="stat-runs">0</strong>
          <span class="records-stat-played">played</span>
        </span>
        <div class="meta-actions">
          <button type="button" class="meta-btn" id="quit-btn">Quit</button>
          <button type="button" class="meta-btn" id="restart-run-btn">Restart</button>
          <button type="button" class="meta-btn meta-btn-danger" id="reset-stats-btn">
            Reset
          </button>
        </div>
      </footer>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
